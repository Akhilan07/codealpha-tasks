<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Responsive Image Gallery</h1>

<div class="filters">
<button onclick="filterSelection('all')">All</button>
<button onclick="filterSelection('nature')">Nature</button>
<button onclick="filterSelection('tech')">Technology</button>
<button onclick="filterSelection('city')">City</button>
</div>

<div class="gallery">
<img class="filter nature" src="https://picsum.photos/400/300?random=1">
<img class="filter nature" src="https://picsum.photos/400/300?random=2">
<img class="filter tech" src="https://picsum.photos/400/300?random=3">
<img class="filter tech" src="https://picsum.photos/400/300?random=4">
<img class="filter city" src="https://picsum.photos/400/300?random=5">
<img class="filter city" src="https://picsum.photos/400/300?random=6">
</div>

<script src="script.js"></script>
</body>
</html>
